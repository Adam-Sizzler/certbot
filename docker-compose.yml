x-network: &network
  networks:
    - all-net

services:
  certbot:
    <<: [*network]
    image: ghcr.io/adam-sizzler/certbot:${CERTBOT_VERSION:-latest}
    container_name: certbot
    volumes:
      - certificate:/etc/haproxy/certs
      - haproxy-socket:/var/run/haproxy
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      - EMAIL=${EMAIL}
      - DNS_CLOUDFLARE_API_TOKEN=${DNS_CLOUDFLARE_API_TOKEN}
      - DHPARAM_ENABLED=${DHPARAM_ENABLED:-false}
    env_file:
      - ".env"
    healthcheck:
      test: ["CMD", "sh", "-c", "[ -s /etc/haproxy/certs/${DOMAIN_NAME}.pem ]"]
      interval: 20s
      timeout: 5s
      retries: 3
    profiles: [full, certbot]

volumes:
  certificate:
    name: certificate
    driver: local
  haproxy-socket:
    name: haproxy-socket
    driver: local

networks:
  all-net:
    driver: bridge
